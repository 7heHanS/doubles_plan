<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>더블즈 플랜 - Doubles Plan</title>
    <!-- Pretendard (한국어) 폰트 지원 -->
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css" />
    <style>
        :root {
            /* 1. 카지노/포커 고급 테마 팔레트 */
            --primary-bg: #0a3a22; /* 딥 포커 그린 */
            --game-board: #0d4a2b; /* 보드 테이블 그린 */
            --scoreboard-bg: #1a1a1a;
            --gold: #f59e0b;
            --gold-glow: rgba(245, 158, 11, 0.6);
            --red-tile: #dc2626;
            --black-tile: #171717;
            --border-gray: #52525b; /* 검은색 카드에 적용될 얇은 회색 테두리 */
            --text-white: #f8fafc;
            
            /* 카드 크기 비율 조정 */
            --card-w: 80px; 
            --card-h: 120px;
            --hand-card-w: 120px; /* 플레이어 덱 터치성을 위한 가로 1.5배 크기 */
            --hand-card-h: 180px; /* 플레이어 덱 터치성을 위한 세로 1.5배 크기 */
        }

        * {
            box-sizing: border-box;
            transition: all 0.3s ease;
        }

        /* 3. 반응형 100dvh 레이아웃 설정 */
        body {
            font-family: 'Pretendard Variable', 'Noto Sans KR', sans-serif;
            background: radial-gradient(circle at top, #155e32 0%, #052411 100%);
            background-color: var(--primary-bg); /* 폴백 */
            color: var(--text-white);
            margin: 0;
            padding: 2dvh 2vw;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100dvh; /* 모바일 브라우저 탭 간섭 해결 */
            overflow: hidden; 
        }

        h1 {
            font-weight: 800;
            color: var(--gold);
            text-shadow: 0 0 15px var(--gold-glow);
            margin: 1dvh 0;
            font-size: clamp(2rem, 4vh, 3rem);
            text-align: center;
            width: 100%;
            flex-shrink: 0;
        }

        #game-container {
            width: 100%;
            max-width: 960px;
            background: radial-gradient(circle at center, #125e36 0%, #0b381f 100%);
            padding: 3dvh 3vw;
            border-radius: 24px;
            box-shadow: 
                0 40px 80px rgba(0,0,0,0.8),
                inset 0 4px 30px rgba(0,0,0,0.6);
            border: 1px solid rgba(255, 255, 255, 0.1);
            
            /* 내부 컴포넌트들을 비율에 맞게 분할하기 위해 flex-grow 활용 */
            display: flex;
            flex-direction: column;
            flex-grow: 1;
            justify-content: space-between;
        }

        /* Scoreboard */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.5dvh 3vw;
            border: 2px solid var(--gold);
            border-radius: 16px;
            background: var(--scoreboard-bg);
            box-shadow: 
                0 0 20px var(--gold-glow),
                inset 0 0 10px rgba(0,0,0,0.8);
            flex-shrink: 0;
        }

        .player-info { 
            flex: 1; 
            text-align: center; 
        }
        .player-info div:first-child { 
            font-size: clamp(1.1rem, 2vh, 1.4rem); 
            color: var(--gold);
            margin-bottom: 4px;
            font-weight: 700;
        }
        .score { 
            font-size: clamp(2rem, 4vh, 3.5rem); 
            font-weight: 800; 
            text-shadow: 0 0 15px var(--gold-glow);
            color: var(--text-white);
        }
        .score.gain { 
            transform: scale(1.5); 
            color: var(--gold);
            text-shadow: 0 0 30px var(--gold);
        }

        #set-info {
            color: var(--gold);
            font-size: clamp(1rem, 2vh, 1.4rem);
            font-weight: 700;
            padding: 8px 16px;
            border-radius: 8px;
            background: rgba(0,0,0,0.4);
            border: 1px solid var(--gold-glow);
        }

        /* Controls & Messages 통합 구역 */
        #top-info-area {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            flex-shrink: 0;
        }

        #status-message {
            text-align: center;
            font-size: clamp(1.2rem, 2.5vh, 1.8rem);
            color: var(--gold);
            margin: 1.5dvh 0;
            min-height: 1.5em;
            text-shadow: 0 4px 15px rgba(0,0,0,0.9);
            font-weight: 700;
        }

        #opponent-info {
            display: flex;
            justify-content: center;
            gap: 15px;
            min-height: 65px;
        }

        .opp-card-mini {
            width: 45px;
            height: 65px;
            border-radius: 6px;
            border: 2px solid var(--gold);
            background: var(--black-tile);
            opacity: 0.8;
            box-shadow: 0 8px 15px rgba(0,0,0,0.4);
        }
        
        /* 상대방 카드의 색상 구분을 위한 CSS 필수! */
        .opp-card-mini.red { 
            background: var(--red-tile);
            border-color: rgba(255,255,255,0.4);
        }
        .opp-card-mini.black { 
            background: var(--black-tile);
            border-color: var(--border-gray);
        }

        /* Battle Area -> 넓은 화면의 남는 공간을 모두 흡수하도록 flex-grow */
        #battle-area {
            flex-grow: 1; 
            display: flex;
            justify-content: space-evenly; /* 양옆 공간 균등 분할로 중앙 쏠림 현상 방지 */
            align-items: center;
            width: 100%;
            gap: 2vw; /* space-evenly 적용 시 gap은 최소화 가능 */
            perspective: 1500px;
            background: rgba(0, 0, 0, 0.25);
            border-radius: 16px;
            position: relative;
            box-shadow: inset 0 0 40px rgba(0,0,0,0.6);
            border: 1px solid rgba(255, 255, 255, 0.05);
            margin: 2dvh 0;
            min-height: 0; 
        }

        #battle-area::before {
            content: 'VS';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: clamp(4rem, 10vh, 7rem);
            color: rgba(245, 158, 11, 0.15);
            font-weight: 800;
            font-style: italic;
            z-index: 0;
            pointer-events: none;
        }

        .battle-slot {
            display: flex;
            flex-direction: column;
            align-items: center;
            flex: 1; /* 양쪽 슬롯이 동일한 너비를 강제로 차지하게 하여 진짜 중앙 정렬 확보 */
            max-width: 280px;
            gap: 1.5dvh;
            z-index: 1;
        }

        .battle-slot span { 
            color: var(--gold); 
            font-size: clamp(1.2rem, 2.5vh, 1.8rem); 
            font-weight: 800;
            padding: 8px 18px;
            background: var(--scoreboard-bg);
            border-radius: 8px;
            border: 1px solid var(--gold-glow);
        }

        /* 3D Tile Component */
        .tile-3d {
            width: var(--card-w);
            height: var(--card-h);
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .tile-3d.flipped { transform: rotateY(180deg); }

        .tile-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 8px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 2rem;
            font-weight: 800;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
            border: 2px solid var(--gold);
        }

        .tile-front {
            transform: rotateY(180deg);
            color: var(--text-white);
            text-shadow: 0 2px 4px rgba(0,0,0,0.6);
        }
        
        .tile-front.red { 
            background: var(--red-tile);
            border-color: rgba(255,255,255,0.4);
        }
        
        .tile-front.black { 
            background: var(--black-tile);
            border: 2px solid var(--border-gray); /* 검정 타일 구분을 위한 얇은 회색선 */
        }

        .tile-back {
            background: var(--black-tile);
            border: 2px solid var(--border-gray); 
            position: relative;
            overflow: hidden;
        }
        
        .tile-back::after {
            content: 'D';
            font-family: serif;
            color: var(--gold);
            font-size: 2.5rem;
            filter: drop-shadow(0 0 10px var(--gold));
            opacity: 0.8;
            font-weight: bold;
        }

        /* 4. Player Hand 영역 1.5배 스케일업 & 터치 간격 향상 */
        #player-hand {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 40px; /* 타일 간격을 넓혀 터치 접근성 상향 */
            min-height: calc(var(--hand-card-h) + 30px); /* 공간 확보 */
            flex-shrink: 0;
            padding-bottom: 2dvh;
            flex-wrap: wrap; /* 오버플로우 대비 */
        }

        .hand-tile, .draft-btn {
            width: var(--hand-card-w); /* 기존 대비 1.5배 */
            height: var(--hand-card-h); /* 기존 대비 1.5배 */
            border-radius: 12px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 3rem; /* 텍스트 크기도 확장 */
            font-weight: 800;
            cursor: pointer;
            box-shadow: 0 15px 30px rgba(0,0,0,0.5);
            color: var(--text-white);
            text-shadow: 0 2px 6px rgba(0,0,0,0.6);
            transform: translateY(0);
        }
        
        .draft-btn {
            font-size: 1.5rem;
            color: var(--text-white);
            border-radius: 12px;
            padding: 0; 
            border: 2px solid var(--gold);
        }

        .hand-tile:hover, .draft-btn:hover {
            transform: translateY(-20px) scale(1.1) rotate(2deg);
            box-shadow: 0 30px 60px rgba(0,0,0,0.6), 0 0 25px var(--gold-glow);
            filter: brightness(1.2);
            z-index: 10;
        }

        .hand-tile.red, .draft-btn.red { 
            background: var(--red-tile); 
            border: 2px solid rgba(255,255,255,0.4);
        }
        .hand-tile.black, .draft-btn.black { 
            background: var(--black-tile); 
            border: 2px solid var(--border-gray);
        }

        /* 하단 컨트롤 레이아웃 정렬 */
        .controls { 
            display: flex; 
            justify-content: center; 
            flex-shrink: 0;
            min-height: 60px;
            align-items: center;
            width: 100%; /* 하단 플레이어 컨트롤 정중앙 강제 */
        }
        
        #start-btn {
            padding: 2.5dvh 6vw;
            font-family: inherit;
            font-size: clamp(1.2rem, 2.5vh, 1.6rem);
            background: var(--gold);
            color: var(--scoreboard-bg);
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-weight: 800;
            box-shadow: 0 15px 30px rgba(0,0,0,0.5), 0 0 20px var(--gold-glow);
        }

        #start-btn:hover {
            transform: scale(1.05) translateY(-5px);
            box-shadow: 0 25px 50px var(--gold-glow);
            background: #fff;
        }

        /* Animations */
        @keyframes gain-score {
            0% { transform: scale(1); filter: brightness(1); }
            50% { transform: scale(1.4); filter: brightness(1.5); }
            100% { transform: scale(1); filter: brightness(1); }
        }
        .score-animate { animation: gain-score 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275); }

    </style>
</head>
<body>
    <!-- 2. 게임 요소의 온전한 한국어화 -->
    <h1>더블즈 플랜</h1>
    
    <div id="game-container">
        <header>
            <div class="player-info">
                <div>플레이어</div>
                <div id="player-score" class="score">0</div>
            </div>
            <div id="set-info">1세트 / 4</div>
            <div class="player-info">
                <div>인공지능 전략가</div>
                <div id="ai-score" class="score">0</div>
            </div>
        </header>

        <div id="top-info-area">
            <div id="status-message">대결을 준비하세요</div>
            <div id="opponent-info">
                <!-- AI cards icons -->
            </div>
        </div>

        <div id="battle-area">
            <div class="battle-slot">
                <span>인공지능 전략가</span>
                <div id="ai-tile-container" class="tile-3d" style="visibility:hidden;">
                    <div class="tile-face tile-front" id="ai-tile-front">?</div>
                    <div class="tile-face tile-back"></div>
                </div>
            </div>
            
            <div class="battle-slot">
                <span>플레이어</span>
                <div id="player-tile-container" class="tile-3d" style="visibility:hidden;">
                    <div class="tile-face tile-front" id="player-tile-front">?</div>
                    <div class="tile-face tile-back"></div>
                </div>
            </div>
        </div>

        <div id="player-hand">
            <!-- Tiles -->
        </div>

        <div class="controls">
            <button id="start-btn">게임 시작</button>
        </div>
    </div>

    <script type="module" src="src/engine/gameEngine.js"></script>
</body>
</html>
