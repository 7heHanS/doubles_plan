<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOUBLES PLAN</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --navy-bg: #1e293b;
            --gold: #fbbf24;
            --gold-glow: rgba(251, 191, 36, 0.5);
            --red-tile: #ef4444;
            --black-tile: #334155;
            --text-white: #f8fafc;
            --card-w: 80px;
            --card-h: 120px;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: var(--navy-bg);
            color: var(--text-white);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
            background-image: radial-gradient(circle at center, #334155 0%, #1e293b 100%);
        }

        h1 {
            font-family: 'Cinzel', serif;
            letter-spacing: 4px;
            color: var(--gold);
            text-shadow: 0 0 15px var(--gold-glow);
            margin: 10px 0;
            font-size: 2.5rem;
        }

        #game-container {
            width: 100%;
            max-width: 900px;
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(15px);
            padding: 30px;
            border-radius: 24px;
            border: 1px solid rgba(251, 191, 36, 0.3);
            box-shadow: 0 30px 60px rgba(0,0,0,0.6);
        }

        /* Scoreboard */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 40px;
            border: 3px solid var(--gold);
            border-radius: 20px;
            background: linear-gradient(145deg, #334155, #0f172a);
            box-shadow: 0 0 20px var(--gold-glow), inset 0 0 15px var(--gold-glow);
            margin-bottom: 30px;
        }

        .player-info { text-align: center; }
        .player-info div:first-child { 
            font-family: 'Cinzel', serif; 
            font-size: 1rem; 
            color: var(--gold);
            margin-bottom: 5px;
            letter-spacing: 1px;
        }
        .score { 
            font-size: 3rem; 
            font-weight: 700; 
            text-shadow: 0 0 15px var(--gold-glow);
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), color 0.3s;
        }
        .score.gain { transform: scale(1.4); color: #fff; text-shadow: 0 0 25px #fff; }

        #set-info {
            font-family: 'Cinzel', serif;
            color: var(--gold);
            font-size: 1.2rem;
            background: rgba(0,0,0,0.3);
            padding: 5px 15px;
            border-radius: 10px;
            border: 1px solid var(--gold-glow);
        }

        /* Battle Area */
        #battle-area {
            height: 280px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 80px;
            perspective: 1200px;
            margin-bottom: 30px;
            background: rgba(15, 23, 42, 0.4);
            border-radius: 20px;
            border: 1px solid rgba(251, 191, 36, 0.1);
            position: relative;
        }

        #battle-area::before {
            content: 'VS';
            position: absolute;
            font-family: 'Cinzel', serif;
            font-size: 3rem;
            color: rgba(251, 191, 36, 0.1);
            z-index: 0;
        }

        .battle-slot {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            z-index: 1;
        }

        .battle-slot span { 
            font-family: 'Cinzel', serif; 
            color: var(--gold); 
            font-size: 0.9rem; 
            letter-spacing: 1px;
            background: rgba(0,0,0,0.5);
            padding: 2px 10px;
            border-radius: 4px;
        }

        /* 3D Tile Component */
        .tile-3d {
            width: var(--card-w);
            height: var(--card-h);
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .tile-3d.flipped { transform: rotateY(180deg); }

        .tile-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 12px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 2.2rem;
            font-weight: 700;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            border: 2px solid rgba(255,255,255,0.15);
        }

        .tile-front {
            background: #475569;
            transform: rotateY(180deg);
            color: white;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }
        .tile-front.red { 
            background: linear-gradient(135deg, #f87171, #ef4444); 
            border-color: rgba(255,255,255,0.3);
        }
        .tile-front.black { 
            background: linear-gradient(135deg, #475569, #334155); 
            border-color: rgba(255,255,255,0.2);
        }

        .tile-back {
            background: linear-gradient(135deg, #334155, #1e293b);
            border: 2px solid var(--gold);
            background-image: 
                repeating-linear-gradient(45deg, transparent, transparent 10px, rgba(251,191,36,0.08) 10px, rgba(251,191,36,0.08) 20px);
            box-shadow: 0 0 20px rgba(0,0,0,0.4), inset 0 0 20px var(--gold-glow);
        }
        
        .tile-back::after {
            content: 'D';
            font-family: 'Cinzel', serif;
            color: var(--gold);
            opacity: 0.4;
            font-size: 2.5rem;
            filter: drop-shadow(0 0 5px var(--gold));
        }

        /* Hand & Selection */
        #player-hand, #opponent-info {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 30px;
            min-height: 120px;
            align-items: flex-end;
        }

        .hand-tile {
            width: var(--card-w);
            height: var(--card-h);
            border-radius: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 2rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 2px solid rgba(255,255,255,0.2);
            box-shadow: 0 10px 20px rgba(0,0,0,0.4);
            color: white;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }

        .hand-tile:hover {
            transform: translateY(-20px) scale(1.1);
            box-shadow: 0 25px 50px rgba(0,0,0,0.6), 0 0 20px var(--gold-glow);
            filter: brightness(1.2);
            border-color: var(--gold);
        }

        .hand-tile.red { background: linear-gradient(135deg, #f87171, #ef4444); }
        .hand-tile.black { background: linear-gradient(135deg, #475569, #334155); }

        .opp-card-mini {
            width: 40px;
            height: 60px;
            border-radius: 6px;
            border: 1.5px solid var(--gold);
            background: var(--navy-bg);
            opacity: 0.9;
            box-shadow: 0 5px 10px rgba(0,0,0,0.3);
            transition: transform 0.3s;
        }
        .opp-card-mini.red { background: linear-gradient(135deg, #ef4444, #991b1b); }
        .opp-card-mini.black { background: linear-gradient(135deg, #334155, #0f172a); }

        /* Controls */
        #status-message {
            text-align: center;
            font-family: 'Cinzel', serif;
            font-size: 1.5rem;
            color: var(--gold);
            margin-bottom: 40px;
            min-height: 1.5em;
            text-shadow: 0 2px 10px rgba(0,0,0,0.8);
            letter-spacing: 2px;
        }

        .controls { display: flex; justify-content: center; margin-top: 20px; }
        
        #start-btn {
            padding: 20px 60px;
            font-family: 'Cinzel', serif;
            font-size: 1.5rem;
            background: linear-gradient(to bottom, #fbbf24, #d97706);
            color: #0f172a;
            border: 2px solid #fff;
            border-radius: 60px;
            cursor: pointer;
            font-weight: 800;
            box-shadow: 0 15px 30px rgba(0,0,0,0.4), 0 0 20px var(--gold-glow);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            letter-spacing: 2px;
        }

        #start-btn:hover {
            transform: scale(1.1) translateY(-5px);
            box-shadow: 0 20px 40px var(--gold-glow);
            filter: brightness(1.1);
        }

        .draft-btn {
            padding: 15px 35px;
            border-radius: 12px;
            border: 2px solid rgba(255,255,255,0.3);
            color: white;
            cursor: pointer;
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            font-weight: 700;
            transition: all 0.3s;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }
        .draft-btn:hover { 
            transform: scale(1.15) translateY(-5px); 
            filter: brightness(1.3);
            box-shadow: 0 15px 30px rgba(0,0,0,0.5);
        }

        /* Animations */
        @keyframes result-flash {
            0% { box-shadow: 0 0 0 var(--gold-glow); }
            50% { box-shadow: 0 0 50px var(--gold-glow); }
            100% { box-shadow: 0 30px 60px rgba(0,0,0,0.6); }
        }
        .flash-effect { animation: result-flash 0.6s ease-out; }

    </style>
</head>
<body>
    <h1>DOUBLES PLAN</h1>
    
    <div id="game-container">
        <header>
            <div class="player-info">
                <div>PLAYER</div>
                <div id="player-score" class="score">0</div>
            </div>
            <div id="set-info">SET 1 / 4</div>
            <div class="player-info">
                <div>AI STRATEGIST</div>
                <div id="ai-score" class="score">0</div>
            </div>
        </header>

        <div id="status-message">PREPARE FOR THE DUEL</div>

        <div id="opponent-info">
            <!-- AI cards icons -->
        </div>

        <div id="battle-area">
            <div class="battle-slot">
                <span>AI STRATEGIST</span>
                <div id="ai-tile-container" class="tile-3d" style="visibility:hidden;">
                    <div class="tile-face tile-front" id="ai-tile-front">?</div>
                    <div class="tile-face tile-back"></div>
                </div>
            </div>
            
            <div class="battle-slot">
                <span>PLAYER</span>
                <div id="player-tile-container" class="tile-3d" style="visibility:hidden;">
                    <div class="tile-face tile-front" id="player-tile-front">?</div>
                    <div class="tile-face tile-back"></div>
                </div>
            </div>
        </div>

        <div id="player-hand">
            <!-- Tiles -->
        </div>

        <div class="controls">
            <button id="start-btn">COMMENCE GAME</button>
        </div>
    </div>

    <script type="module" src="src/engine/gameEngine.js"></script>
</body>
</html>
