<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOUBLES PLAN</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-bg: #1e293b;
            --game-board: #2d3748;
            --scoreboard-bg: #0f172a;
            --gold: #fbbf24;
            --gold-glow: rgba(251, 191, 36, 0.6);
            --red-tile: #ef4444;
            --slate-gray: #475569;
            --text-white: #f8fafc;
            --card-w: 80px;
            --card-h: 120px;
        }

        * {
            box-sizing: border-box;
            transition: all 0.3s ease;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: var(--primary-bg);
            color: var(--text-white);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        h1 {
            font-family: 'Cinzel', serif;
            letter-spacing: 6px;
            color: var(--gold);
            text-shadow: 0 0 20px var(--gold-glow);
            margin: 20px 0;
            font-size: 3rem;
            text-align: center;
        }

        #game-container {
            width: 100%;
            max-width: 960px;
            background: var(--game-board);
            padding: 40px;
            border-radius: 32px;
            box-shadow: 
                0 40px 80px rgba(0,0,0,0.7),
                inset 0 4px 20px rgba(0,0,0,0.5);
            border: 1px solid rgba(255, 255, 255, 0.05);
            position: relative;
        }

        /* Scoreboard */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 25px 50px;
            border: 3px solid var(--gold);
            border-radius: 24px;
            background: var(--scoreboard-bg);
            box-shadow: 
                0 0 30px var(--gold-glow),
                inset 0 0 10px rgba(0,0,0,0.8);
            margin-bottom: 40px;
        }

        .player-info { text-align: center; }
        .player-info div:first-child { 
            font-family: 'Cinzel', serif; 
            font-size: 1.1rem; 
            color: var(--gold);
            margin-bottom: 8px;
            letter-spacing: 2px;
        }
        .score { 
            font-size: 3.5rem; 
            font-weight: 700; 
            text-shadow: 0 0 15px var(--gold-glow);
            color: var(--text-white);
        }
        .score.gain { 
            transform: scale(1.5); 
            color: var(--gold);
            text-shadow: 0 0 30px var(--gold);
        }

        #set-info {
            font-family: 'Cinzel', serif;
            color: var(--gold);
            font-size: 1.4rem;
            font-weight: 700;
            padding: 10px 20px;
            border-radius: 12px;
            background: rgba(0,0,0,0.4);
            border: 1px solid var(--gold-glow);
        }

        /* Battle Area */
        #battle-area {
            height: 300px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 100px;
            perspective: 1500px;
            margin-bottom: 40px;
            background: rgba(15, 23, 42, 0.3);
            border-radius: 24px;
            position: relative;
            box-shadow: inset 0 0 30px rgba(0,0,0,0.4);
        }

        #battle-area::before {
            content: 'VS';
            position: absolute;
            font-family: 'Cinzel', serif;
            font-size: 4rem;
            color: rgba(251, 191, 36, 0.05);
            font-weight: 700;
        }

        .battle-slot {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            z-index: 1;
        }

        .battle-slot span { 
            font-family: 'Cinzel', serif; 
            color: var(--gold); 
            font-size: 1rem; 
            letter-spacing: 1.5px;
            padding: 4px 12px;
            background: var(--scoreboard-bg);
            border-radius: 6px;
            border: 1px solid var(--gold-glow);
        }

        /* 3D Tile Component */
        .tile-3d {
            width: var(--card-w);
            height: var(--card-h);
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .tile-3d.flipped { transform: rotateY(180deg); }

        .tile-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 14px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 2.5rem;
            font-weight: 700;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            border: 2px solid var(--gold);
        }

        .tile-front {
            transform: rotateY(180deg);
            color: var(--text-white);
            text-shadow: 0 2px 4px rgba(0,0,0,0.6);
        }
        
        .tile-front.red { 
            background: var(--red-tile);
            border-color: rgba(255,255,255,0.4);
        }
        
        .tile-front.black { 
            background: var(--slate-gray);
            border-color: var(--gold);
        }

        .tile-back {
            background: var(--slate-gray);
            border: 2px solid var(--gold);
            position: relative;
            overflow: hidden;
        }
        
        .tile-back::after {
            content: 'D';
            font-family: 'Cinzel', serif;
            color: var(--gold);
            font-size: 3rem;
            filter: drop-shadow(0 0 10px var(--gold));
            opacity: 0.8;
        }

        /* Hand & Selection */
        #player-hand, #opponent-info {
            display: flex;
            justify-content: center;
            gap: 25px;
            margin-bottom: 40px;
            min-height: 130px;
            align-items: flex-end;
        }

        .hand-tile {
            width: var(--card-w);
            height: var(--card-h);
            border-radius: 14px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 2.2rem;
            font-weight: 700;
            cursor: pointer;
            border: 2px solid var(--gold);
            box-shadow: 0 15px 30px rgba(0,0,0,0.5);
            color: var(--text-white);
            text-shadow: 0 2px 4px rgba(0,0,0,0.6);
            transform: translateY(0);
        }

        .hand-tile:hover {
            transform: translateY(-25px) scale(1.15) rotate(2deg);
            box-shadow: 0 30px 60px rgba(0,0,0,0.6), 0 0 25px var(--gold-glow);
            filter: brightness(1.2);
            z-index: 10;
        }

        .hand-tile.red { 
            background: var(--red-tile); 
            border-color: rgba(255,255,255,0.4);
        }
        .hand-tile.black { 
            background: var(--slate-gray); 
            border-color: var(--gold);
        }

        .opp-card-mini {
            width: 45px;
            height: 65px;
            border-radius: 8px;
            border: 2px solid var(--gold);
            background: var(--slate-gray);
            opacity: 0.8;
            box-shadow: 0 8px 15px rgba(0,0,0,0.4);
        }

        /* Controls & Messages */
        #status-message {
            text-align: center;
            font-family: 'Cinzel', serif;
            font-size: 1.8rem;
            color: var(--gold);
            margin-bottom: 45px;
            min-height: 2em;
            text-shadow: 0 4px 15px rgba(0,0,0,0.9);
            letter-spacing: 3px;
        }

        .controls { display: flex; justify-content: center; margin-top: 30px; }
        
        #start-btn {
            padding: 22px 70px;
            font-family: 'Cinzel', serif;
            font-size: 1.6rem;
            background: var(--gold);
            color: var(--scoreboard-bg);
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-weight: 800;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5), 0 0 20px var(--gold-glow);
            letter-spacing: 3px;
        }

        #start-btn:hover {
            transform: scale(1.1) translateY(-5px);
            box-shadow: 0 25px 50px var(--gold-glow);
            background: #fff;
        }

        /* Animations */
        @keyframes gain-score {
            0% { transform: scale(1); filter: brightness(1); }
            50% { transform: scale(1.4); filter: brightness(1.5); }
            100% { transform: scale(1); filter: brightness(1); }
        }
        .score-animate { animation: gain-score 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275); }

    </style>
</head>
<body>
    <h1>DOUBLES PLAN</h1>
    
    <div id="game-container">
        <header>
            <div class="player-info">
                <div>PLAYER</div>
                <div id="player-score" class="score">0</div>
            </div>
            <div id="set-info">SET 1 / 4</div>
            <div class="player-info">
                <div>AI STRATEGIST</div>
                <div id="ai-score" class="score">0</div>
            </div>
        </header>

        <div id="status-message">PREPARE FOR THE DUEL</div>

        <div id="opponent-info">
            <!-- AI cards icons -->
        </div>

        <div id="battle-area">
            <div class="battle-slot">
                <span>AI STRATEGIST</span>
                <div id="ai-tile-container" class="tile-3d" style="visibility:hidden;">
                    <div class="tile-face tile-front" id="ai-tile-front">?</div>
                    <div class="tile-face tile-back"></div>
                </div>
            </div>
            
            <div class="battle-slot">
                <span>PLAYER</span>
                <div id="player-tile-container" class="tile-3d" style="visibility:hidden;">
                    <div class="tile-face tile-front" id="player-tile-front">?</div>
                    <div class="tile-face tile-back"></div>
                </div>
            </div>
        </div>

        <div id="player-hand">
            <!-- Tiles -->
        </div>

        <div class="controls">
            <button id="start-btn">COMMENCE GAME</button>
        </div>
    </div>

    <script type="module" src="src/engine/gameEngine.js"></script>
</body>
</html>
